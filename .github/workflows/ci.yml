name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  core:
    name: Core (lint + test, any OS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --check
      - run: cargo clippy -p convasist-core --all-targets -- -D warnings
      - run: cargo test -p convasist-core

  ui:
    name: UI (typecheck + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build

  shell-windows:
    name: Tauri shell (Windows — Phase 1 target)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      # generate_context! embeds the built frontend, so build the UI first.
      - run: npm ci
      - run: npm run build
      - run: cargo clippy -p convasist-app --all-targets -- -D warnings
